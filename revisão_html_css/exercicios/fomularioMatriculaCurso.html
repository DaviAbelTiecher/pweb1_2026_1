<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercicio 01 - Matricula</title>
    <style>
        fieldset {
            width: max-content;
        }
    </style>
</head>
<body>

    <form action="/action_page.html">
        <fieldset>
            <legend>Formulário Matricula de Curso</legend>

            Primeiro nome:<br>
            <input type="text" name="pnome"><br><br>

            Sobrenome:<br>
            <input type="text" name="unome"><br><br>

            <b>Curso:</b><br>
            <input type="radio" id="tecnico" name="curso" value="tecnico">
            <label for="tecnico">Técnico em Informática</label><br>

            <input type="radio" id="grad" name="curso" value="grad">
            <label for="grad">Graduação - Análise e Desenvolvimento de Sistemas</label><br>

            <input type="radio" id="prof" name="curso" value="prof">
            <label for="prof">Profissionalizante - Programação Web</label><br><br>

            <b>Linguagens de preferência:</b><br>
            <input type="checkbox" id="php" name="l1"> PHP<br>
            <input type="checkbox" id="java" name="l2"> Java<br>
            <input type="checkbox" id="py" name="l3"> Python<br><br>

            Escolha um turno:
            <select name="turno">
                <option value="m">Manhã</option>
                <option value="t">Tarde</option>
                <option value="n">Noite</option>
            </select><br><br>

            Escolha uma unidade:<br>
            <input list="unidades" name="unidade" placeholder="Chapecó">
            <datalist id="unidades">
                <option value="Chapecó">
                <option value="Florianópolis">
                <option value="Joinville">
            </datalist><br><br>

            <input type="submit" value="Enviar">
        </fieldset>
    </form>

</body>
</html>
