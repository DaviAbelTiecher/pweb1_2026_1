<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercicio 02 - Manutenção</title>
    <style>
        fieldset {
            width: max-content;
        }
    </style>
</head>
<body>

    <form action="/action_page.html">
        <fieldset>
            <legend>Sistema de Gestão Acadêmica</legend>

            <h3>Manutenção de Usuários do Sistema Interno</h3>

            Login:<br>
            <input type="text" name="login"><br><br>

            Senha:<br>
            <input type="text" name="senha"><br><br>

            <b>Status:</b><br>
            <select name="status">
                <option value="inativo">Inativo</option>
                <option value="ativo">Ativo</option>
            </select><br><br>

            <b>Tipo:</b>
            <input type="radio" id="tecnico" name="tipo" value="tecnico">
            <label for="tecnico">Técnico</label>
            
            <input type="radio" id="professor" name="tipo" value="professor">
            <label for="professor">Professor</label>
            
            <input type="radio" id="aluno" name="tipo" value="aluno">
            <label for="aluno">Aluno</label><br><br>

            Data Criação:<br>
            <input type="date" name="data_criacao"><br><br>

            <b>Perfil:</b>
            <input type="radio" id="convidado" name="perfil" value="convidado">
            <label for="convidado">Convidado</label>
            
            <input type="radio" id="adm" name="perfil" value="adm">
            <label for="adm">Administrador</label><br><br>

            Observações:<br>
            <textarea name="obs" rows="4" cols="40"></textarea><br><br>

            <b>Módulos:</b><br>
            <input type="checkbox" name="m1"> Compras
            <input type="checkbox" name="m2"> Biblioteca
            <input type="checkbox" name="m3"> Acadêmico <br>
            <input type="checkbox" name="m4"> Documentação
            <input type="checkbox" name="m5"> Recursos Humanos <br><br>

            <input type="submit" value="Salvar">
            <input type="button" value="Excluir">

        </fieldset>
    </form>

</body>
</html>
